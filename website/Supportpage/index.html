    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script defer>
    const SUPABASE_URL = "https://kmgwkyrdimsrvhnngdrw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttZ3dreXJkaW1zcnZobm5nZHJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4ODI4OTQsImV4cCI6MjA4ODQ1ODg5NH0.pvzNz4GRQ6l7wtmz6iAXSMlz6LlUVOGGKwp19E7HQN0";
    let supabaseClient;

      window.addEventListener("DOMContentLoaded", async () => {
        supabaseClient = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_ANON_KEY
        );
        await loadSupport();
      });

      // 2) Fetch students from Supabase and display in table
      async function loadSupport() {
        const tableBody = document.getElementById("support-table");
        const statusEl = document.getElementById("status");

        tableBody.innerHTML = '<tr><td colspan="4">Loading data…</td></tr>';

        const { data, error } = await supabaseClient
          .from("support")
          .select("id, name, feedback_type, support_query, date_raised")
          .order("id", { ascending: true });

        if (error) {
          tableBody.innerHTML =
            '<tr><td colspan="4">Error loading data</td></tr>';
          statusEl.textContent = error.message;
          return;
        }

        if (!data || data.length === 0) {
          tableBody.innerHTML =
            '<tr><td colspan="4">No Support querys found</td></tr>';
          statusEl.textContent = "Tip: Add support requests in Supabase Table Editor.";
          return;
        }

        tableBody.innerHTML = "";
        data.forEach((support, index) => { // for each student, create a table row with a delete button
          const row = document.createElement("tr");
          const d = new Date(support.date_raised);
          const formatted = d.toLocaleString();
          console.log(formatted)

          row.innerHTML = `
            <td>${support.id ?? ""}</td>
            <td>${support.name ?? ""}</td>
            <td>${support.feedback_type ?? ""}</td>
            <td>${support.support_query ?? ""}</td>
            <td>${formatted ?? ""}</td>
            <td> 
                <button class="btn-delete"onclick="deleteSupport(${
                  support.id
                }, this)"> Delete </button>    
            </td>
          `;

          tableBody.appendChild(row);
        });

        statusEl.textContent = "";
      }
    </script>
</head>
