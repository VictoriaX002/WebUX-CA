<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CA</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
      defer
    ></script>
    <script defer>
      const SUPABASE_URL = "https://kmgwkyrdimsrvhnngdrw.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttZ3dreXJkaW1zcnZobm5nZHJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4ODI4OTQsImV4cCI6MjA4ODQ1ODg5NH0.pvzNz4GRQ6l7wtmz6iAXSMlz6LlUVOGGKwp19E7HQN0";
      let supabaseClient;

      let editingSupportId = null;

      window.addEventListener("DOMContentLoaded", async () => {
        supabaseClient = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_ANON_KEY,
        );
        await loadSupport();
        document
          .getElementById("add-btn")
          .addEventListener("click", addSupport);
      });

      // 2) Fetch students from Supabase and display in table
      async function loadSupport() {
        const tableBody = document.getElementById("support-table");
        const statusEl = document.getElementById("status");

        tableBody.innerHTML = '<tr><td colspan="4">Loading data…</td></tr>';

        const { data, error } = await supabaseClient
          .from("support")
          .select("id, name, feedback_type, support_query, date_raised")
          .order("id", { ascending: true });

        if (error) {
          tableBody.innerHTML =
            '<tr><td colspan="4">Error loading data</td></tr>';
          statusEl.textContent = error.message;
          return;
        }

        if (!data || data.length === 0) {
          tableBody.innerHTML =
            '<tr><td colspan="4">No Support queries found</td></tr>';
          statusEl.textContent =
            "Tip: Add support requests in Supabase Table Editor.";
          return;
        }

        tableBody.innerHTML = "";
        data.forEach((support, index) => {
          const row = document.createElement("tr");
          const d = new Date(support.date_raised);
          const formatted = d.toLocaleString();
          console.log(formatted);

          row.innerHTML = `
            <td id="td_${support.id ?? ""}">${support.id ?? ""}</td>
            <td id="td_name_${support.id ?? ""}">${support.name ?? ""}</td>
            <td id="td_feedbackType_${support.id ?? ""}">${support.feedback_type ?? ""}</td>
            <td id="td_query_${support.id ?? ""}">${support.support_query ?? ""}</td>
            <td>${formatted ?? ""}</td>

            <td>
              <button class="btn-edit" onclick="editSupport('${support.id}')"> Edit </button
            </td>

            <td> 
                <button class="btn-delete"onclick="deleteSupport(${
                  support.id
                }, this)"> Delete </button>    
            </td>
          `;

          tableBody.appendChild(row);
        });

        statusEl.textContent = "";
      }

      // 3) Delete support query (Delete the info from the database)
      async function deleteSupport(id, btnEl) {
        const statusEl = document.getElementById("status");

        if (!confirm(`Delete Support Query ${id}?`)) return;

        btnEl.disabled = true;
        statusEl.textContent = "Deleting...";

        try {
          const { data, error } = await supabaseClient
            .from("support")
            .delete()
            .eq("id", id) 
            .select("id"); 

          if (error) {
            console.error("Delete error:", error);
            statusEl.textContent = "Delete failed: " + (error.message || "");
            return;
          }

          if (!data || data.length === 0) {
            statusEl.textContent =
              "Not deleted in Supabase (0 rows). Check RLS policy / ID type.";
            return;
          }

          const rowEl = btnEl.closest("tr");
          if (rowEl) rowEl.remove();

          statusEl.textContent = "Query deleted ✔";
          setTimeout(() => (statusEl.textContent = ""), 1200);
        } finally {
          btnEl.disabled = false;
        }
      }

      // 4) In add mode, adds a new row into the database and the table,
      // 4) In edit mode, updates the current values to the edited values in the database and the table
      async function addSupport() {
        const statusEl = document.getElementById("status");
        const nameInput = document.getElementById("name-input");
        const feedbackTypeSelect = document.getElementById(
          "feedback-type-select",
        );
        const queryTextArea = document.getElementById("query-text-area");

        const name = nameInput.value.trim();
        const feedbackType =
          feedbackTypeSelect.options[feedbackTypeSelect.selectedIndex].text;
        const query = queryTextArea.value.trim();

        if (!name || !feedbackType || !query) {
          statusEl.textContent =
            "Please enter both name and query and choose a feedback type.";
          return;
        }

        statusEl.textContent = "Saving...";

        let result;
        if (editingSupportId) {
          result = await supabaseClient
            .from("support")
            .update({ name, feedback_type: feedbackType, support_query: query })
            .eq("id", Number(editingSupportId));
        } else {
          result = await supabaseClient
            .from("support")
            .insert([
              { name, feedback_type: feedbackType, support_query: query },
            ]);
        }

        if (result.error) {
          statusEl.textContent = "Save failed: " + result.error.message;
          return;
        }

        editingSupportId = null;
        nameInput.value = "";
        // feedback_type will have the first option selected by default (Events)
        feedbackTypeSelect.selectedIndex = 0;
        queryTextArea.value = "";

        statusEl.textContent = "Saved ";
        await loadSupport();
      }

      // 5) Edit support query currently in the table in the form 
      function editSupport(supportId) {
        editingSupportId = supportId;

        const id_td = document.getElementById(`td_${supportId}`);
        const name_td = document.getElementById(`td_name_${supportId}`);
        const feedbackType_td = document.getElementById(
          `td_feedbackType_${supportId}`,
        );
        const query_td = document.getElementById(`td_query_${supportId}`);

        const name = name_td.innerText;
        const feedbackType = feedbackType_td.innerText;
        const query = query_td.innerText;

        const nameInput = document.getElementById("name-input");
        const feedbackTypeSelect = document.getElementById(
          "feedback-type-select",
        );
        const queryTextArea = document.getElementById("query-text-area");

        nameInput.value = name;

        for (const option of feedbackTypeSelect.options) {
          if (option.text === feedbackType) {
            option.selected = true;
            break;
          }
        }
        queryTextArea.value = query;

        document.getElementById("status").textContent = "Editing query...";
      }
    </script>
  </head>
  <body>
    <nav class="navbar">
      <span class="nav-title">Placeholder</span>
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Events</a>
        <a href="#">Societies</a>
        <a href="#">Support</a>
      </div>
    </nav>

    <h1 class="table-header">Help Request Form</h1>
    <form>
      <label>Name</label><br />
      <input id="name-input" type="name" placeholder="Enter your name" />
      <br /><br />
      <label>Feedback_Type:</label><br />
      <select id="feedback-type-select">
        <option>Events</option>
        <option>Societies</option>
        <option>Bookings</option>
        <option>Other</option></select
      ><br /><br />
      <label>Support Query:</label><br />
      <textarea
        id="query-text-area"
        rows="5"
        cols="50"
        placeholder="Type your query message"
      ></textarea
      ><br /><br />
      <button id="add-btn">Submit</button>
    </form>
    <br /><br /><br />

    <h1 class="table-header">Support Queries</h1>
    <table>
      <thead>
        <tr>
          <th>Query ID</th>
          <th>Student Name</th>
          <th>Feedback_Type</th>
          <th>Query</th>
          <th>Date Raised</th>
          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="support-table">
        <tr>
          <td colspan="5">Loading data…</td>
        </tr>
      </tbody>
    </table>

    <div id="status" class="status"></div>
  </body>
</html>
