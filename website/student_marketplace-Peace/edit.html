<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Product</title>

    <style>
      body {
        margin: 0;
        font-family: "Times New Roman";
        background: linear-gradient(135deg, #2fdcfa, #2c26dc);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h1 {
        margin-bottom: 15px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
      }

      input:focus {
        border-color: #05adb0;
      }

      button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        border: none;
        border-radius: 10px;
        background: #4a0cf5;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #00c8ff;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>EDIT PRODUCT</h1>

      <form id="editForm">
        <input type="text" id="title" placeholder="Product Title" required />
        <input
          type="text"
          id="description"
          placeholder="Description"
          required
        />
        <input type="number" id="price" placeholder="Price (€)" required />

        <button type="submit">Update</button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="edit.js"></script>
  </body>
</html>
