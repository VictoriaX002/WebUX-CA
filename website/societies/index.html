<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Societies - Campus Life Companion</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css"/>

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

  <!-- ✅ NAVBAR (same as homepage) -->
  <header>
    <nav class="navbar">
      <h1>Campus Life Companion</h1>
      <ul class="nav-links">
        <li><a href="../homepage/index.html">Home</a></li>
        <li><a href="../events/index.html">Events</a></li>
        <li><a href="../societies/index.html" class="active">Societies</a></li>
        <li><a href="../rooms/index.html">Rooms</a></li>
        <li><a href="../Supportpage/index.html">Support</a></li>
      </ul>
    </nav>
  </header>

  <!-- ✅ MAIN CONTENT -->
  <main class="container">

    <!-- Page intro -->
    <section class="card full-width">
      <h2>Student Societies</h2>
      <p class="section-text">
        Explore societies, join communities, and connect with other students on campus.
      </p>
    </section>

    <!-- Join form -->
    <section class="card join-card">
      <h2>Join a Society</h2>

      <form id="joinForm" class="join-form">
        <div class="form-group">
          <label>Student ID</label>
          <input type="number" id="studentId" required />
        </div>

        <div class="form-group">
          <label>Student Name</label>
          <input type="text" id="studentName" required />
        </div>

        <div class="form-group">
          <label>Select Society</label>
          <select id="societySelect" required>
            <option value="">Choose a society</option>
          </select>
        </div>

        <button type="submit" class="primary-btn">Join Society</button>
      </form>

      <div id="formMessage" class="message"></div>
    </section>

    <!-- Societies list -->
    <section class="card">
      <h2>Available Societies</h2>
      <div id="societyList" class="society-list"></div>
    </section>

    <!-- Members -->
    <section class="card full-width">
      <div class="members-header">
        <h2>Society Members</h2>

        <select id="memberFilter">
          <option value="all">All Societies</option>
        </select>
      </div>

      <div id="membersTableContainer"></div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Campus Life Companion. All rights reserved.</p>
  </footer>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>

</body>
</html>
