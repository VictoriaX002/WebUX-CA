<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Societies</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>Student Societies</h1>
    <p>Browse societies, join one, and manage members.</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Join a Society</h2>

      <form id="joinForm" class="join-form">
        <div class="form-group">
          <label for="studentId">Student ID</label>
          <input type="number" id="studentId" placeholder="Enter your student ID" required />
        </div>

        <div class="form-group">
          <label for="studentName">Student Name</label>
          <input type="text" id="studentName" placeholder="Enter your full name" required />
        </div>

        <div class="form-group">
          <label for="societySelect">Choose a Society</label>
          <select id="societySelect" required>
            <option value="">Select a society</option>
          </select>
        </div>

        <button type="submit" class="primary-btn">Join Society</button>
      </form>

      <div id="formMessage" class="message"></div>
    </section>

    <section class="card">
      <h2>Available Societies</h2>
      <div id="societyList" class="society-list"></div>
    </section>

    <section class="card full-width">
      <div class="members-header">
        <h2>Society Members</h2>
        <select id="memberFilter">
          <option value="all">All Societies</option>
        </select>
      </div>

      <div id="membersTableContainer"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
